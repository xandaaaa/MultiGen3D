<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MultiGen3D Results Comparison</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 16px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      color: #fff;
    }

    /* Shape nav */
    #shape-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    #shape-nav button {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #ccc;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    #shape-nav button:hover {
      background: #3a3a3a;
      color: #fff;
    }

    #shape-nav button.active {
      background: #4a7cdc;
      border-color: #6a9cf0;
      color: #fff;
    }

    .shape-section {
      display: none;
    }

    .shape-section.visible {
      display: block;
    }

    .shape-header {
      font-size: 1.1rem;
      color: #adf;
      margin-bottom: 16px;
    }

    .global-desc {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    /* Prompt tabs */
    .prompt-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .prompt-tab {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #ccc;
      padding: 5px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .prompt-tab:hover {
      background: #3a3a3a;
    }

    .prompt-tab.active {
      background: #5a4fa0;
      border-color: #8a7fd0;
      color: #fff;
    }

    .prompt-panel {
      display: none;
    }

    .prompt-panel.visible {
      display: block;
    }

    /* Prompt text box */
    .prompt-box {
      background: #1e1e2e;
      border-left: 4px solid #7c6fcd;
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .prompt-box .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 4px;
    }

    .prompt-box .global-text {
      font-size: 1rem;
      color: #ddf;
      margin-bottom: 10px;
    }

    .prompt-box .local-heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 6px;
      margin-top: 6px;
    }

    .local-parts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .local-part {
      background: #2a2435;
      border: 1px solid #4a3f6a;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.82rem;
      color: #ccc;
    }

    .local-part span {
      color: #aaa;
      font-size: 0.72rem;
      margin-right: 4px;
    }

    /* Side-by-side comparison */
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .method-block {}

    .method-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      display: inline-block;
    }

    .method-label.baseline {
      background: #2a3a2a;
      color: #8fcf8f;
      border: 1px solid #4a6f4a;
    }

    .method-label.local-sq {
      background: #2a2a3a;
      color: #8f8fcf;
      border: 1px solid #4a4a6f;
    }

    .views-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .views-grid img {
      width: 100%;
      border-radius: 4px;
      border: 1px solid #333;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .views-grid img:hover {
      transform: scale(1.02);
      border-color: #666;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 6px;
    }

    #lightbox .close-btn {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 2rem;
      cursor: pointer;
      color: #fff;
      line-height: 1;
    }


    /* CLIP score */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .score-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.82rem;
    }

    .score-chip.baseline {
      background: #1e2e1e;
      border: 1px solid #4a6f4a;
    }

    .score-chip.local-sq {
      background: #1e1e2e;
      border: 1px solid #4a4a6f;
    }

    .score-chip .method {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-right: 2px;
    }

    .score-chip .val {
      font-size: 0.95rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .score-chip.baseline .val {
      color: #8fcf8f;
    }

    .score-chip.local-sq .val {
      color: #8f8fcf;
    }

    .score-chip .delta {
      font-size: 0.72rem;
      margin-left: 2px;
    }

    .delta.win {
      color: #6fcf6f;
    }

    .delta.loss {
      color: #cf6f6f;
    }

    .score-chip .winner-crown {
      font-size: 0.8rem;
      margin-left: 3px;
    }

    /* Overall summary bar */
    #overall-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 24px;
      font-size: 0.82rem;
    }

    #overall-bar .ob-label {
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.7rem;
      margin-right: 4px;
    }

    #overall-bar .ob-chip {
      padding: 3px 10px;
      border-radius: 4px;
      font-variant-numeric: tabular-nums;
    }

    #overall-bar .ob-chip.baseline {
      background: #1e2e1e;
      color: #8fcf8f;
      border: 1px solid #4a6f4a;
    }

    #overall-bar .ob-chip.local-sq {
      background: #1e1e2e;
      color: #8f8fcf;
      border: 1px solid #4a4a6f;
    }

    @media (max-width: 700px) {
      .comparison {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function renderData() {
      const nav = document.getElementById('shape-nav');
      const container = document.getElementById('shapes-container');

      DATA.forEach((shape, si) => {
        // Nav button
        const btn = document.createElement('button');
        btn.textContent = shape.id.replace(/_[a-f0-9]+$/, '') + ' ' + (si + 1);
        btn.title = shape.id;
        btn.onclick = () => activateShape(si);
        if (si === 0) btn.classList.add('active');
        nav.appendChild(btn);

        // Shape section
        const sec = document.createElement('div');
        sec.className = 'shape-section' + (si === 0 ? ' visible' : '');
        sec.id = 'shape-' + si;

        sec.innerHTML = `
      <div class="shape-header">${shape.id}</div>
      <div class="global-desc">${shape.global_description} &mdash; Parts: ${Object.entries(shape.parts).map(([k, v]) => `<strong>${k}</strong>: ${v}`).join(', ')}</div>
      <div class="prompt-tabs">${shape.prompts.map((_, pi) => `<button class="prompt-tab ${pi === 0 ? 'active' : ''}" onclick="activatePrompt(${si},${pi})">Prompt ${pi}</button>`).join('')}</div>
      ${shape.prompts.map((prompt, pi) => {
          const localPrompt = shape.local_prompts[pi];
          const localParts = Object.entries(localPrompt).map(([k, v]) =>
            `<div class="local-part"><span>SQ${k}</span>${v}</div>`).join('');
          return `
        <div class="prompt-panel ${pi === 0 ? 'visible' : ''}" id="panel-${si}-${pi}">
          <div class="prompt-box">
            <div class="label">Global Prompt</div>
            <div class="global-text">${prompt}</div>
            <div class="local-heading">Local Prompts per Part</div>
            <div class="local-parts">${localParts}</div>
          </div>
          <div class="score-bar" id="scores-${si}-${pi}"></div>
          <div class="comparison">
            <div class="method-block">
              <div class="method-label baseline">SpaceControl</div>
              <div class="views-grid">
                ${[0, 1, 2, 3].map(v => `<img src="spacecontrol_results/renders/${shape.id}/prompt_${pi}/view_${v}.png" alt="view ${v}" onclick="openLightbox(this.src)">`).join('')}
              </div>
            </div>
            <div class="method-block">
              <div class="method-label local-sq">MultiGen</div>
              <div class="views-grid">
                ${[0, 1, 2, 3].map(v => `<img src="multigen_results/renders/${shape.id}/prompt_${pi}/view_${v}.png" alt="view ${v}" onclick="openLightbox(this.src)">`).join('')}
              </div>
            </div>
          </div>
        </div>`;
        }).join('')}
    `;
        container.appendChild(sec);
      });
    }

    function activateShape(si) {
      document.querySelectorAll('.shape-section').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('#shape-nav button').forEach(el => el.classList.remove('active'));
      document.getElementById('shape-' + si).classList.add('visible');
      document.querySelectorAll('#shape-nav button')[si].classList.add('active');
    }

    function activatePrompt(si, pi) {
      const sec = document.getElementById('shape-' + si);
      sec.querySelectorAll('.prompt-panel').forEach(el => el.classList.remove('visible'));
      sec.querySelectorAll('.prompt-tab').forEach(el => el.classList.remove('active'));
      document.getElementById(`panel-${si}-${pi}`).classList.add('visible');
      sec.querySelectorAll('.prompt-tab')[pi].classList.add('active');
    }

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeLightbox();
    });

    renderData();

    function populateScores(si, pi) {
      const shape = DATA[si];
      const bar = document.getElementById('scores-' + si + '-' + pi);
      if (!bar) return;
      const sc = (CLIP_SCORES[shape.id] || {})[String(pi)];
      if (!sc) { bar.innerHTML = ''; return; }
      const bv = sc.spacecontrol, lv = sc.multigen;
      const diff = (lv - bv).toFixed(4);
      const sign = diff > 0 ? '+' : '';
      const bWins = bv >= lv;
      bar.innerHTML = `
    <span class="score-chip baseline">
      <span class="method">SpaceControl</span>
      <span class="val">${bv.toFixed(4)}</span>
      ${bWins ? '<span class="winner-crown">&#9733;</span>' : ''}
    </span>
    <span class="score-chip local-sq">
      <span class="method">MultiGen</span>
      <span class="val">${lv.toFixed(4)}</span>
      ${!bWins ? '<span class="winner-crown">&#9733;</span>' : ''}
      <span class="delta ${diff >= 0 ? 'win' : 'loss'}">(${sign}${diff})</span>
    </span>`;
    }

    // Override activatePrompt to also update scores
    const _origActivatePrompt = activatePrompt;
    activatePrompt = function (si, pi) {
      _origActivatePrompt(si, pi);
      populateScores(si, pi);
    };

    // Init overall bar
    document.getElementById('ob-baseline').textContent = CLIP_OVERALL.spacecontrol.toFixed(4);
    document.getElementById('ob-local-sq').textContent = CLIP_OVERALL.multigen.toFixed(4);

    // Populate scores for the initially visible panels
    DATA.forEach((_, si) => populateScores(si, 0));

  </script>
